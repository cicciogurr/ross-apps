<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ross Apps</title>
<style>
body{background:#0a0e1a;color:#e0e8f5;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;gap:20px;padding:20px}
h1{color:#00d4ff;font-size:2em;margin-bottom:10px}
.cards{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:800px}
.card{background:#111827;border:1px solid #1e3a6a;border-radius:12px;padding:24px 32px;text-align:center;text-decoration:none;color:#e0e8f5;transition:transform 0.2s,border-color 0.2s;min-width:200px}
.card:hover{transform:translateY(-4px);border-color:#00d4ff}
.card .emoji{font-size:2.5em;display:block;margin-bottom:8px}
.card .title{font-size:1.1em;font-weight:700;color:#00d4ff}
.card .sub{font-size:0.85em;color:#7a8faa;margin-top:4px}
</style>
</head>
<body>
<h1>🤙 Ross Apps</h1>
<div class="cards">
  <a class="card" href="emea-telecom/"><span class="emoji">🌐</span><span class="title">EMEA Telecom</span><span class="sub">Digital Infrastructure News</span></a>
  <a class="card" href="tennis/"><span class="emoji">🎾</span><span class="title">Tennis Live</span><span class="sub">ATP • WTA • Rankings • Calendar</span></a>
  <a class="card" href="forex/"><span class="emoji">📊</span><span class="title">Forex Strategy</span><span class="sub">EUR/USD Backtest Report</span></a>
  <a class="card" href="gbp-btc/"><span class="emoji">₿</span><span class="title">GBP & Bitcoin</span><span class="sub">Multi-Asset Backtest</span></a>
<a class="card" href="expenses/"><span class="emoji">💼</span><span class="title">Expense Tracker</span><span class="sub">Note Spese Professionali</span></a>
</div>
</body>
</html>
